CLI_ID="claude"
CLI_DISPLAY_NAME="Claude Code"
CLI_BINARY_NAME="claude"
CLI_INSTALL_STRATEGY="script"
CLI_INSTALL_REF="@anthropic-ai/claude-code@2.1.114"
CLI_INSTALL_COMMAND="ACTUAL_INTEGRITY=$(npm view @anthropic-ai/claude-code@2.1.114 dist.integrity) && [ \"$ACTUAL_INTEGRITY\" = \"sha512-RPhw1ClFxzOESQdI+bXYp35IXlhS/bi75VIajQgrg11qH10k5jiYZ+ivz1dTN6rbeii+zaCuhjpMzKfdtN/JTw==\" ] && npm install -g @anthropic-ai/claude-code@2.1.114"
CLI_INSTALL_USER="root"
CLI_LAUNCH_COMMAND="claude"
CLI_VERSION_CHECK_COMMAND="claude --version"
CLI_AUTH_STRATEGY="either"
CLI_AUTH_COMMAND="claude"
CLI_AUTH_CHECK_COMMAND="test -d /home/ubuntu/.claude && (ls /home/ubuntu/.claude/.credentials* 2>/dev/null || ls /home/ubuntu/.claude/auth* 2>/dev/null)"
CLI_ALLOWLIST_FILE="domains/anthropic-default.txt"
CLI_REQUIRES_NODE="no"
CLI_REQUIRES_PYTHON="no"
CLI_REQUIRES_UV_OR_PIPX="no"
CLI_RUNTIME_PREREQS=""
CLI_CACHE_STRATEGY="none"
CLI_CACHE_KEY="claude"
CLI_SESSION_HOME_SUBDIR=".claude"
CLI_STATUS_LABEL="CLAUDE"
CLI_PATH_LINK_SOURCE=""
CLI_PATH_LINK_TARGET=""
CLI_DEFAULT_FLAGS="--dangerously-skip-permissions"
