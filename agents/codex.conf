CLI_ID="codex"
CLI_DISPLAY_NAME="OpenAI Codex CLI"
CLI_BINARY_NAME="codex"
CLI_INSTALL_STRATEGY="npm"
CLI_INSTALL_REF="@openai/codex"
CLI_INSTALL_COMMAND="npm install -g @openai/codex"
CLI_INSTALL_USER="root"
CLI_LAUNCH_COMMAND="codex"
CLI_VERSION_CHECK_COMMAND="codex --version"
CLI_AUTH_STRATEGY="either"
CLI_AUTH_COMMAND="codex --login"
CLI_AUTH_CHECK_COMMAND="test -d /home/ubuntu/.codex"
CLI_ALLOWLIST_FILE="domains/openai-default.txt"
CLI_REQUIRES_NODE="yes"
CLI_REQUIRES_PYTHON="no"
CLI_REQUIRES_UV_OR_PIPX="no"
CLI_RUNTIME_PREREQS="bubblewrap"
CLI_CACHE_STRATEGY="npm"
CLI_CACHE_KEY="@openai/codex"
CLI_SESSION_HOME_SUBDIR=".codex"
CLI_STATUS_LABEL="CODEX"
CLI_PATH_LINK_SOURCE=""
CLI_PATH_LINK_TARGET=""
CLI_DEFAULT_FLAGS=""
